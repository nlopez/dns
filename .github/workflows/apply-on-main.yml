name: "Apply DNS on merge to main"

# Trigger when commits are pushed to main (e.g. after PR merge)
on:
  push:
    branches:
      - main
    paths:
      - "dnsconfig.js"

# Limit concurrent runs so only one apply runs at a time
concurrency:
  group: "dns-apply-main"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pins:
    runs-on: ubuntu-latest
    outputs:
      dns_img: ${{ steps.pins.outputs.dns_img }}
      checkout_ref: ${{ steps.pins.outputs.checkout_ref }}
      upload_artifact_ref: ${{ steps.pins.outputs.upload_artifact_ref }}
      github_script_ref: ${{ steps.pins.outputs.github_script_ref }}
    steps:
      - id: pins
        name: Load pinned refs
        uses: ./.github/actions/dnscontrol-run

  approval:
    name: Await manual approval
    needs: pins
    runs-on: ubuntu-latest
    # Request access to the protected environment to trigger GitHub's required reviewers / manual approval.
    environment:
      name: production
    steps:
      - name: Notify awaiting approval
        run: |
          echo "This job requests the 'production' environment and will pause until an approver grants access."
          echo "Once approved, the 'apply' job will proceed."

  apply:
    name: Apply DNS changes
    needs: [pins, approval]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.pins.outputs.dns_img }}
    # It's fine to reference the environment again; approval on the same environment will allow continuation.
    environment: production
    steps:
      - name: Checkout repository
        uses: ${{ needs.pins.outputs.checkout_ref }}

      - name: Verify dnscontrol binary
        run: |
          set -euo pipefail
          dnscontrol --version

      - name: Show changed files
        run: |
          echo "Commit: $GITHUB_SHA"
          git --no-pager show --name-only --pretty=format: $GITHUB_SHA || true

      - name: Ensure required secrets are present
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] ; then
            echo "Missing CLOUDFLARE_API_TOKEN secret" >&2
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] ; then
            echo "Warning: CLOUDFLARE_ACCOUNT_ID secret is not set. Ensure your usage does not require it."
          fi

      - name: Apply DNS changes (dnscontrol push)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cd /github/workspace
          dnscontrol push 2>&1 | tee apply.log

      - name: Upload apply logs
        if: always()
        uses: ${{ needs.pins.outputs.upload_artifact_ref }}
        with:
          name: dns-apply-logs
          path: apply.log

      - name: Create deploy record (optional)
        if: success()
        uses: ${{ needs.pins.outputs.github_script_ref }}
        with:
          script: |
            const body = `DNS changes applied in commit ${process.env.GITHUB_SHA}\n\nSee workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            // best-effort comment on the default branch (no specific PR to attach)
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || context.payload.pull_request?.number || context.payload.number || 0,
              body
            }).catch(() => { /* ignore if cannot comment */ });
