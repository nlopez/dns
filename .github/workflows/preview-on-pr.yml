name: "DNS Preview on PR"

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - "dnsconfig.js"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    container:
      image: "stackexchange/dnscontrol@sha256:d36bacfc948bb37b1d09a465cd5c5127458cf9aa4e8226e9cbeefeb60ac40a12"
    concurrency:
      group: "dns-preview-${{ github.event.pull_request.number }}"
      cancel-in-progress: true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify dnscontrol binary
        run: |
          set -euo pipefail
          dnscontrol --version

      - name: Run dnscontrol preview
        run: |
          set -euo pipefail
          # repository files are available at /github/workspace
          cd /github/workspace
          dnscontrol preview 2>&1 | tee preview.txt

      - name: Upload preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dns-preview
          path: preview.txt

      - name: Comment preview on PR
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('preview.txt', 'utf8');
            const max = 60000; // keep comment beneath the 65536 character limit
            const truncated = body.length > max ? body.slice(0, max) + '\n\n[truncated]' : body;
            const commentBody = "DNS preview output:\n\n```\n" + truncated + "\n```";
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull_request in context; skipping comment.");
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody
              });
            }
